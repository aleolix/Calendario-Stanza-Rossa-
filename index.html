<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stanza Rossa</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

h1 {
  text-align: center;
}

#calendar {
  max-width: 900px;
  margin: auto;
}

.form {
  max-width: 500px;
  margin: 20px auto;
}
input, button {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin: 5px 0;
}

button {
  background-color: #2196f3;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>🏡 Stanza Rossa</h1>

<div class="form">

<label>Nome</label>
<input id="nome" placeholder="Inserisci nome">

<label>Arrivo</label>
<input id="arrivo" type="date">

<label>Partenza</label>
<input id="partenza" type="date">

<button onclick="salvaPrenotazione()">Prenota</button>

</div>


<div id="calendar"></div>


<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBZq_O564_uAGDYm9SoiON7gd3L6Yh-zo4",
  authDomain: "casa-vacanze-calendario.firebaseapp.com",
  projectId: "casa-vacanze-calendario",
  storageBucket: "casa-vacanze-calendario.firebasestorage.app",
  messagingSenderId: "1044832318827",
  appId: "1:1044832318827:web:8eefb4b203e731bce3082e"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
function coloreDaNome(nome) {
  let hash = 0;

  for (let i = 0; i < nome.length; i++) {
    hash = nome.charCodeAt(i) + ((hash << 5) - hash);
  }

  let colore = "#";

  for (let i = 0; i < 3; i++) {
    let valore = (hash >> (i * 8)) & 255;
    colore += ("00" + valore.toString(16)).slice(-2);
  }

  return colore;
}

let calendario;


document.addEventListener("DOMContentLoaded", function() {

calendario = new FullCalendar.Calendar(
document.getElementById("calendar"),
 {
  initialView: "dayGridMonth",
  locale: "it",
  height: "auto",
  headerToolbar: {
    left: "prev,next",
    center: "title",
    right: ""
  },
  events: [],

  eventClick: function(info) {

    const id = info.event.id;
    const nome = info.event.title;

    if (confirm("Cancellare la prenotazione di " + nome + "?")) {
      
      cancellaPrenotazione(id);

    }

  }

 });

 calendario.render();

});


window.salvaPrenotazione = async function(){

const nome = document.getElementById("nome").value;
const arrivo = document.getElementById("arrivo").value;
const partenza = document.getElementById("partenza").value;

if (!nome || !arrivo || !partenza) {
  alert("Compila tutti i campi");
  return;
}
  
if (partenza <= arrivo) {
  alert("La data di partenza deve essere successiva alla data di arrivo");
  return;
}

if (!nome || !arrivo || !partenza) {
  alert("Compila tutti i campi");
  return;
}

let occupato = false;

const prenotazioni = await getDocs(collection(db,"prenotazioni"));

prenotazioni.forEach((doc)=>{

const p = doc.data();

if (arrivo < p.partenza && partenza > p.arrivo) {
  occupato = true;
}

});


if (occupato) {

 alert("Attenzione: queste date sono già occupate");

 return;

}


await addDoc(collection(db,"prenotazioni"),{
 nome,
 arrivo,
 partenza,
 colore: coloreDaNome(nome)
});


alert("Prenotazione salvata!");

};



onSnapshot(collection(db,"prenotazioni"),(snapshot)=>{


let eventi=[];


snapshot.forEach((doc)=>{

const p=doc.data();


eventi.push({

id: doc.id,

title: p.nome,

start: p.arrivo,

end: p.partenza,

backgroundColor: p.colore,
borderColor: p.colore

});

});


if(calendario){

 calendario.removeAllEvents();

 calendario.addEventSource(eventi);

}


});

window.cancellaPrenotazione = async function(id){

if(confirm("Vuoi cancellare questa prenotazione?")){

await deleteDoc(doc(db,"prenotazioni",id));

alert("Prenotazione cancellata");

}

};
</script>

</body>
</html>
