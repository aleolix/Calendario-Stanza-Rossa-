<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Casa Vacanze</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  text-align: center;
}

h1 {
  color: #333;
}

.calendar {
  max-width: 500px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  border: 1px solid #ccc;
  padding: 15px 5px;
}

.header {
  font-weight: bold;
  background: #eee;
}

</style>
</head>

<body>

<h1>🏡 Calendario Casa Vacanze</h1>

<h2>Luglio 2026</h2>

<div class="calendar">
<div class="day header">Lun</div>
<div class="day header">Mar</div>
<div class="day header">Mer</div>
<div class="day header">Gio</div>
<div class="day header">Ven</div>
<div class="day header">Sab</div>
<div class="day header">Dom</div>

<div class="day"></div>
<div class="day"></div>
<div class="day">1</div>
<div class="day">2</div>
<div class="day">3</div>
<div class="day">4</div>
<div class="day">5</div>

<div class="day">6</div>
<div class="day">7</div>
<div class="day">8</div>
<div class="day">9</div>
<div class="day">10</div>
<div class="day">11</div>
<div class="day">12</div>

</div>

</body>
</html>
