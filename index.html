<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stanza Rossa</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 20px auto;
  padding: 10px;
}

h1 {
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

button {
  cursor: pointer;
}

.prenotazione {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>🏡 Stanza Rossa</h1>

<h2>Nuova prenotazione</h2>

<input id="famiglia" placeholder="Nome famiglia">

<label>Arrivo</label>
<input id="arrivo" type="date">

<label>Partenza</label>
<input id="partenza" type="date">

<button onclick="salvaPrenotazione()">Prenota</button>

<h2>Prenotazioni</h2>

<div id="lista"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZq_O564_uAGDYm9SoiON7gd3L6Yh-zo4",
  authDomain: "casa-vacanze-calendario.firebaseapp.com",
  projectId: "casa-vacanze-calendario",
  storageBucket: "casa-vacanze-calendario.firebasestorage.app",
  messagingSenderId: "1044832318827",
  appId: "1:1044832318827:web:8eefb4b203e731bce3082e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvaPrenotazione = async function() {

  const famiglia = document.getElementById("famiglia").value;
  const arrivo = document.getElementById("arrivo").value;
  const partenza = document.getElementById("partenza").value;

  await addDoc(collection(db, "prenotazioni"), {
    famiglia: famiglia,
    arrivo: arrivo,
    partenza: partenza
  });

  alert("Prenotazione salvata!");
};


onSnapshot(collection(db, "prenotazioni"), (snapshot) => {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  snapshot.forEach((doc) => {

    const p = doc.data();

    lista.innerHTML += `
      <div class="prenotazione">
      👤 ${p.famiglia}<br>
      📅 ${p.arrivo} → ${p.partenza}
      </div>
    `;

  });

});
</script>

</body>
</html>
